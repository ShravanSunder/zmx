name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup mise
        uses: jdx/mise-action@v3

      # --- Import Apple Developer ID certificate via official Apple action ---

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Determine signing identity
        id: signing
        run: |
          # Dynamically discover the Developer ID identity from the keychain
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')

          if [ -n "$IDENTITY" ]; then
            echo "Found signing identity: $IDENTITY"
            echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"
            echo "can_sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No Developer ID Application certificate found — falling back to ad-hoc signing"
            echo "identity=-" >> "$GITHUB_OUTPUT"
            echo "can_sign=false" >> "$GITHUB_OUTPUT"
          fi

      # --- Submodule commit SHAs (cache keys) ---

      - name: Get submodule SHAs
        id: submodules
        run: |
          GHOSTTY_SHA=$(git -C vendor/ghostty rev-parse HEAD)
          ZMX_SHA=$(git -C vendor/zmx rev-parse HEAD)
          echo "ghostty_sha=$GHOSTTY_SHA" >> "$GITHUB_OUTPUT"
          echo "zmx_sha=$ZMX_SHA" >> "$GITHUB_OUTPUT"
          echo "Ghostty: $GHOSTTY_SHA"
          echo "zmx: $ZMX_SHA"

      # --- Artifact caches (skip zig builds on hit) ---

      - name: Cache Ghostty artifacts
        id: cache-ghostty
        uses: actions/cache@v4
        with:
          path: |
            vendor/ghostty/macos/GhosttyKit.xcframework
            vendor/ghostty/zig-out/share
          key: ghostty-${{ runner.os }}-${{ steps.submodules.outputs.ghostty_sha }}

      - name: Cache zmx artifacts
        id: cache-zmx
        uses: actions/cache@v4
        with:
          path: vendor/zmx/zig-out
          key: zmx-${{ runner.os }}-${{ steps.submodules.outputs.zmx_sha }}

      # --- Zig compilation cache (speeds up builds on cache miss) ---
      # Following Ghostty's pattern: explicit cache dirs for zig internals

      - name: Cache Zig compilation
        if: steps.cache-ghostty.outputs.cache-hit != 'true' || steps.cache-zmx.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            vendor/ghostty/.zig-cache
            vendor/zmx/.zig-cache
          key: zig-compile-${{ runner.os }}-${{ hashFiles('.mise.toml') }}-${{ steps.submodules.outputs.ghostty_sha }}-${{ steps.submodules.outputs.zmx_sha }}
          restore-keys: |
            zig-compile-${{ runner.os }}-${{ hashFiles('.mise.toml') }}-

      # --- Build Ghostty (only on cache miss) ---

      - name: Build Ghostty XCFramework
        if: steps.cache-ghostty.outputs.cache-hit != 'true'
        run: |
          cd vendor/ghostty
          zig build -Doptimize=ReleaseFast -Demit-xcframework=true -Demit-macos-app=false -Dxcframework-target=native

      # --- Build zmx (only on cache miss) ---

      - name: Build zmx
        if: steps.cache-zmx.outputs.cache-hit != 'true'
        run: |
          cd vendor/zmx
          zig build -Doptimize=ReleaseFast

      # --- Always: copy framework, setup resources, build Swift, bundle ---

      - name: Copy XCFramework
        run: |
          mkdir -p Frameworks
          cp -R vendor/ghostty/macos/GhosttyKit.xcframework Frameworks/

      - name: Setup dev resources
        run: |
          # Shell integration (prefer zig-out, fall back to vendor source)
          if [ -d "vendor/ghostty/zig-out/share/ghostty/shell-integration" ]; then
            SRC="vendor/ghostty/zig-out/share/ghostty/shell-integration"
          elif [ -d "vendor/ghostty/src/shell-integration" ]; then
            SRC="vendor/ghostty/src/shell-integration"
          else
            echo "ERROR: shell-integration not found" && exit 1
          fi
          mkdir -p Sources/AgentStudio/Resources/ghostty
          rm -rf Sources/AgentStudio/Resources/ghostty/shell-integration
          cp -R "$SRC" Sources/AgentStudio/Resources/ghostty/shell-integration

          # Terminfo
          TERMINFO_SRC="vendor/ghostty/zig-out/share/terminfo"
          if [ -d "$TERMINFO_SRC" ]; then
            mkdir -p Sources/AgentStudio/Resources/terminfo/78 Sources/AgentStudio/Resources/terminfo/67
            [ -f "$TERMINFO_SRC/78/xterm-ghostty" ] && cp "$TERMINFO_SRC/78/xterm-ghostty" Sources/AgentStudio/Resources/terminfo/78/
            [ -f "$TERMINFO_SRC/67/ghostty" ] && cp "$TERMINFO_SRC/67/ghostty" Sources/AgentStudio/Resources/terminfo/67/
          fi

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: .build
          key: swift-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}-${{ hashFiles('Sources/**/*.swift') }}
          restore-keys: |
            swift-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}-
            swift-${{ runner.os }}-

      - name: Build AgentStudio
        run: |
          set -o pipefail
          swift build -c release 2>&1 | scripts/filter-known-linker-warnings.sh | xcbeautify --renderer github-actions

      - name: Create App Bundle
        run: |
          set -euo pipefail
          APP_DIR="AgentStudio.app/Contents"
          rm -rf AgentStudio.app
          mkdir -p "$APP_DIR/MacOS" "$APP_DIR/Resources"

          cp .build/release/AgentStudio "$APP_DIR/MacOS/"
          [ -f "vendor/zmx/zig-out/bin/zmx" ] && cp vendor/zmx/zig-out/bin/zmx "$APP_DIR/MacOS/"
          cp Sources/AgentStudio/Resources/Info.plist "$APP_DIR/"
          cp Sources/AgentStudio/Resources/AppIcon.icns "$APP_DIR/Resources/"
          [ -d "Sources/AgentStudio/Resources/terminfo" ] && cp -R Sources/AgentStudio/Resources/terminfo "$APP_DIR/Resources/"
          if [ -d "Sources/AgentStudio/Resources/ghostty" ]; then
            mkdir -p "$APP_DIR/Resources/ghostty"
            cp -R Sources/AgentStudio/Resources/ghostty/. "$APP_DIR/Resources/ghostty/"
          fi

          # GhosttyKit is a static library (libghostty.a) — already linked into
          # the AgentStudio binary at build time. Do NOT embed the xcframework
          # in the app bundle; it's only needed at build time for SwiftPM.

      # --- Code signing (Developer ID or ad-hoc fallback) ---

      - name: Sign app bundle
        env:
          SIGNING_IDENTITY: ${{ steps.signing.outputs.identity }}
          CAN_SIGN: ${{ steps.signing.outputs.can_sign }}
        run: |
          set -euo pipefail
          ENTITLEMENTS="Sources/AgentStudio/Resources/AgentStudio.entitlements"
          APP="AgentStudio.app"

          if [ "$CAN_SIGN" = "true" ]; then
            echo "Signing with: $SIGNING_IDENTITY"

            # Sign any embedded dylibs or frameworks (inside-out)
            find "$APP/Contents/Frameworks" -type d -name "*.framework" -print0 2>/dev/null | while IFS= read -r -d '' item; do
              codesign --force --sign "$SIGNING_IDENTITY" --timestamp --options runtime "$item"
            done
            find "$APP/Contents/Frameworks" -type f -name "*.dylib" -print0 2>/dev/null | while IFS= read -r -d '' item; do
              codesign --force --sign "$SIGNING_IDENTITY" --timestamp --options runtime "$item"
            done

            # Sign zmx helper binary
            if [ -f "$APP/Contents/MacOS/zmx" ]; then
              codesign --force --sign "$SIGNING_IDENTITY" --timestamp --options runtime \
                --entitlements "$ENTITLEMENTS" "$APP/Contents/MacOS/zmx"
            fi

            # Sign the main app bundle
            codesign --force --sign "$SIGNING_IDENTITY" --timestamp --options runtime \
              --entitlements "$ENTITLEMENTS" "$APP"
          else
            echo "Ad-hoc signing (no Developer ID configured)..."
            codesign --force --deep --sign - "$APP"
          fi

          # Verify
          codesign --verify --deep --strict --verbose "$APP"
          echo "App bundle signed and verified"

      # --- Notarization (only with Developer ID) ---

      - name: Submit app for notarization
        if: steps.signing.outputs.can_sign == 'true'
        id: notarize_submit
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          set -euo pipefail

          echo "Creating ZIP for notarization..."
          ditto -c -k --keepParent AgentStudio.app AgentStudio-notarize.zip

          echo "Submitting to Apple notary service..."
          SUBMISSION_ID=$(xcrun notarytool submit AgentStudio-notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --output-format json | jq -r '.id')

          echo "submission_id=$SUBMISSION_ID" >> "$GITHUB_OUTPUT"
          echo "Submission ID: $SUBMISSION_ID"

      - name: Wait for notarization
        if: steps.signing.outputs.can_sign == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          SUBMISSION_ID: ${{ steps.notarize_submit.outputs.submission_id }}
        run: |
          set -euo pipefail

          echo "Waiting for notarization: $SUBMISSION_ID (up to 30m)..."
          if ! xcrun notarytool wait "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --timeout 30m; then
            echo "::error::Notarization failed or timed out."

            echo "Current status:"
            xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_NOTARY_PASSWORD" || true

            echo "Fetching notarization log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_NOTARY_PASSWORD" notary-log.json || true
            test -f notary-log.json && cat notary-log.json || true

            exit 1
          fi

      - name: Staple notarization ticket
        if: steps.signing.outputs.can_sign == 'true'
        run: |
          set -euo pipefail
          xcrun stapler staple AgentStudio.app
          spctl --assess --type execute --verbose AgentStudio.app
          rm -f AgentStudio-notarize.zip

      # --- Package and release ---

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create ZIP Archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ditto -c -k --keepParent AgentStudio.app "AgentStudio-${VERSION}-macos.zip"
          echo "ARTIFACT_NAME=AgentStudio-${VERSION}-macos.zip" >> $GITHUB_ENV

      - name: Compute SHA256
        run: |
          SHA256=$(shasum -a 256 "${{ env.ARTIFACT_NAME }}" | awk '{print $1}')
          echo "SHA256: $SHA256"
          echo "RELEASE_SHA256=$SHA256" >> $GITHUB_ENV

      - name: Upload artifact as backup
        uses: actions/upload-artifact@v4
        with:
          name: AgentStudio-${{ steps.version.outputs.version }}
          path: ${{ env.ARTIFACT_NAME }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: ${{ env.ARTIFACT_NAME }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          body: |
            **SHA256:** `${{ env.RELEASE_SHA256 }}`
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
